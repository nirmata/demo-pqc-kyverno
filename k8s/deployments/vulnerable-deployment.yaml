# This deployment should be BLOCKED by Kyverno image verification policies.
# The image acme/legacy-payment-service:2.3.1 has a CBOM attestation showing
# quantum-vulnerable algorithms (RSA, ECDSA, ECDH, DH).
#
# Kyverno verifyImages fetches the attestation from the image and inspects
# the predicate inline -- no annotations needed on the deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-payment-service
  namespace: pqc-enforced
  labels:
    app: legacy-payment-service
    app.kubernetes.io/part-of: pqc-security-demo
    pqc.security.io/cbom-attested: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: legacy-payment-service
  template:
    metadata:
      labels:
        app: legacy-payment-service
    spec:
      containers:
        - name: payment-service
          image: acme/legacy-payment-service:2.3.1
          ports:
            - containerPort: 8443
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
